name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check tag matches manifest version
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match manifest version $VERSION"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
